name: ✨ 功能提案
description: 提议一个新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢分享想法！在提交之前，建议先看看是否已有类似的 Issue 或 Roadmap 计划。

  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 这个功能是为了解决什么用户痛点？
      placeholder: "作为创作者，我希望..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你的方案
      description: 你希望产品/接口/界面变成什么样？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（可选）
      description: 你考虑过哪些其他做法？为什么不选它们？

  - type: dropdown
    id: scope
    attributes:
      label: 主要涉及
      multiple: true
      options:
        - 极速模式
        - 分镜 / 剧本
        - 角色一致性
        - 生成任务 / 队列
        - 模型 / API Key
        - FFmpeg 合成
        - 前端 UI / UX
        - 文档 / 开发者体验
        - 其他

  - type: checkboxes
    id: willing_to_help
    attributes:
      label: 你愿意帮忙实现吗？
      options:
        - label: 我愿意提交 PR
        - label: 我可以协助设计 / 讨论
        - label: 暂时只是提议